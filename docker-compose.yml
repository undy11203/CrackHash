version: '3.8'

services:
  manager:
    build:
      context: ./manager
      dockerfile: Dockerfile
    container_name: crackhash-manager
    ports:
      - "8080:8080"
    networks:
      - crackhash-network
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: crackhash-worker
    ports:
      - "8081:8081"
    networks:
      - crackhash-network
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - MANAGER_URL=http://manager:8080
    depends_on:
      manager:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  crackhash-network:
    driver: bridge
